<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fond éditorial Chams Adams">
  <defs>
    <radialGradient id="noir" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#1E1A14"/>
      <stop offset="45%" stop-color="#12100C"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="40%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#C9A961" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Base sombre -->
  <rect width="1920" height="1080" fill="url(#noir)"/>

  <!-- Halo doré au centre haut -->
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Particules dorées (suggestion de broderies lointaines) -->
  <g fill="#C9A961" filter="url(#soft)">
    <circle cx="320" cy="210" r="1.6" opacity="0.35"/>
    <circle cx="510" cy="175" r="1" opacity="0.28"/>
    <circle cx="780" cy="240" r="0.9" opacity="0.22"/>
    <circle cx="1020" cy="155" r="1.2" opacity="0.3"/>
    <circle cx="1260" cy="205" r="1.4" opacity="0.32"/>
    <circle cx="1450" cy="270" r="1" opacity="0.25"/>
    <circle cx="1620" cy="330" r="0.8" opacity="0.22"/>
    <circle cx="250" cy="480" r="1" opacity="0.24"/>
    <circle cx="470" cy="540" r="1.3" opacity="0.3"/>
    <circle cx="660" cy="590" r="0.8" opacity="0.2"/>
    <circle cx="940" cy="560" r="1.5" opacity="0.35"/>
    <circle cx="1180" cy="520" r="1" opacity="0.25"/>
    <circle cx="1360" cy="640" r="1.2" opacity="0.3"/>
    <circle cx="1580" cy="580" r="0.9" opacity="0.25"/>
    <circle cx="380" cy="780" r="1" opacity="0.26"/>
    <circle cx="590" cy="840" r="1.3" opacity="0.3"/>
    <circle cx="850" cy="780" r="0.8" opacity="0.22"/>
    <circle cx="1120" cy="850" r="1.5" opacity="0.33"/>
    <circle cx="1340" cy="800" r="1" opacity="0.26"/>
    <circle cx="1550" cy="880" r="1.2" opacity="0.3"/>
  </g>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
