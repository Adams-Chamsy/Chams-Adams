    <path d="M 540 310 Q 600 290 660 310" stroke-width="1.5"/>
    <!-- Ligne de montage centrale -->
    <line x1="600" y1="310" x2="600" y2="1300" stroke-width="0.8" stroke-dasharray="4 6"/>
    <!-- Flèches de grain -->
