<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder — tracé à la craie sur tissu noir, ciseaux d'orfèvre">
  <defs>
    <linearGradient id="bgC2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0A08"/>
