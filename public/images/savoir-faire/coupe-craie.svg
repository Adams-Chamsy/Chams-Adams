    <circle cx="420" cy="460" r="3" fill="#E8DFC9" stroke="none"/>
    <circle cx="780" cy="460" r="3" fill="#E8DFC9" stroke="none"/>
    <circle cx="380" cy="620" r="3" fill="#E8DFC9" stroke="none"/>
    <circle cx="820" cy="620" r="3" fill="#E8DFC9" stroke="none"/>
    <circle cx="360" cy="820" r="3" fill="#E8DFC9" stroke="none"/>
