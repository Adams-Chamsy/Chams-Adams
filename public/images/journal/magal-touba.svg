<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder — foule du Magal de Touba, kaftans clairs sous lumière dorée">
  <defs>
    <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6D39E"/>
      <stop offset="35%" stop-color="#C9A961"/>
      <stop offset="65%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#0D0A08"/>
